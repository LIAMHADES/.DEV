<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VtoTXforIA – Logo Azul</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#000000;min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2rem;
}
.scene{
    position:relative;
    width:min(96vw,1200px);
    aspect-ratio:4800/1222;overflow:hidden;
}
#glowC{
    position:absolute;inset:0;z-index:1;
    width:100%;height:100%;
    filter:blur(8px);pointer-events:none;
}
#logoC{
    position:relative;z-index:2;
    width:100%;height:100%;
    mix-blend-mode:screen;
}
</style>
</head>
<body>
<div class="scene">
    <canvas id="glowC"></canvas>
    <canvas id="logoC"></canvas>
</div>
<script>
const img=new Image();
img.src='logo_glow.png';

const lv=document.getElementById('logoC');
const lx=lv.getContext('2d');
const gv=document.getElementById('glowC');
const gx=gv.getContext('2d');

let ready=false;

img.onload=()=>{
    const W=img.width,H=img.height;
    lv.width=gv.width=W;
    lv.height=gv.height=H;

    // ─── LOGO canvas ───
    // Original → luminancia base
    lx.drawImage(img,0,0,W,H);

    // Offscreen: gradiente vertical turquesa → azul cielo → azul marino
    const oc=document.createElement('canvas').getContext('2d');
    oc.canvas.width=W;oc.canvas.height=H;
    const og=oc.createLinearGradient(0,0,0,H);
    og.addColorStop(0.0, '#A0D8F1');  // azul cielo claro arriba
    og.addColorStop(0.4, '#4A90D9');  // azul medio
    og.addColorStop(1.0, '#002244');  // azul marino oscuro abajo
    oc.fillStyle=og;
    oc.fillRect(0,0,W,H);

    // 'color' composite: coge saturación/matiz del gradiente, luminancia del original
    lx.globalCompositeOperation='color';
    lx.drawImage(oc.canvas,0,0);
    lx.globalCompositeOperation='source-over';

    // Clip a silueta del logo
    lx.globalCompositeOperation='destination-in';
    lx.drawImage(img,0,0,W,H);
    lx.globalCompositeOperation='source-over';

    // Contraste y saturación extra para que resalten los extremos
    lv.style.filter='contrast(1.6) saturate(1.9)';

    // ─── GLOW ───
    ready=true;
    animGlow();
};

function animGlow(){
    if(!ready){requestAnimationFrame(animGlow);return}
    const t=performance.now()/2000;
    const pos=(t%1);
    const W=gv.width,H=gv.height;
    gx.clearRect(0,0,W,H);

    gx.save();

    gx.filter='blur(8px)';
    gx.drawImage(img,0,0,W,H);

    gx.globalCompositeOperation='source-in';

    // Rotar 30° → luz inclinada
    gx.translate(W/2,H/2);
    gx.rotate(30*Math.PI/180);

    // Sweep: empieza fuera a la izquierda, termina fuera a la derecha
    const totalWidth=W*1.5;
    const peak=pos*W*2.0-W; // pico de -1.0W a +1.0W
    const sx=peak-totalWidth/2;

    const gr=gx.createLinearGradient(sx,0,sx+totalWidth,0);
    gr.addColorStop(0,  'transparent');
    gr.addColorStop(0.08,'rgba(255,255,255,0)');
    gr.addColorStop(0.18,'rgba(255,255,255,0.06)');
    gr.addColorStop(0.28,'rgba(255,255,255,0.2)');
    gr.addColorStop(0.38,'rgba(255,255,255,0.5)');
    gr.addColorStop(0.45,'rgba(255,255,255,0.8)');
    gr.addColorStop(0.50,'rgba(255,255,255,1)');
    gr.addColorStop(0.55,'rgba(255,255,255,0.8)');
    gr.addColorStop(0.62,'rgba(255,255,255,0.5)');
    gr.addColorStop(0.72,'rgba(255,255,255,0.2)');
    gr.addColorStop(0.82,'rgba(255,255,255,0.06)');
    gr.addColorStop(0.92,'rgba(255,255,255,0)');
    gr.addColorStop(1,  'transparent');
    gx.fillStyle=gr;
    gx.fillRect(-3000,-3000,6000,6000);

    gx.restore();

    requestAnimationFrame(animGlow);
}

</script>
</body>
</html>
